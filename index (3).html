<style>

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%}
  body{
    font-family:"Segoe UI",sans-serif;background:linear-gradient(135deg,#0a0e14 0%,#16212b 50%,#0f1419 100%);
    color:var(--light-text);min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:20px;overflow-x:hidden;
  }

  .container{max-width:700px;width:100%;animation:fadeIn 0.8s ease-in}
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .header{text-align:center;margin-bottom:40px}
  .header h1{
    font-size:clamp(28px,6vw,42px);font-weight:300;letter-spacing:2px;margin-bottom:8px;
    background:linear-gradient(135deg,#d4a574,#e8b4a8);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text;
  }
  .header p{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted)}

  .card{
    background:linear-gradient(135deg,rgba(212,165,116,0.06),rgba(232,180,168,0.04));
    border:1px solid rgba(212,165,116,0.2);border-radius:12px;padding:clamp(30px,5vw,50px);
    margin-bottom:30px;position:relative;overflow:hidden;backdrop-filter:blur(10px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
  }
  .card::before{content:"";position:absolute;top:-50%;right:-50%;width:300px;height:300px;
    border-radius:50%;background:radial-gradient(circle,rgba(232,180,168,0.05),transparent);pointer-events:none}

  .quote-text{
    font-size:clamp(20px,4.5vw,28px);line-height:1.6;font-weight:300;letter-spacing:0.3px;
    color:var(--light-text);margin-bottom:20px;position:relative;z-index:1;font-style:italic;
  }
  .quote-author{
    font-size:14px;color:var(--accent);font-weight:500;letter-spacing:0.5px;
    margin-top:16px;padding-top:12px;border-top:1px solid rgba(212,165,116,0.3);
  }

  .meta{
    display:flex;justify-content:space-between;align-items:center;font-size:11px;
    color:var(--text-muted);margin-top:14px;letter-spacing:0.5px;
  }

  .controls{
    display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;
  }
  .btn{
    appearance:none;cursor:pointer;padding:12px 20px;border-radius:6px;
    border:1px solid rgba(212,165,116,0.4);background:rgba(212,165,116,0.1);
    color:var(--light-text);font-size:12px;letter-spacing:1px;text-transform:uppercase;
    transition:all 0.3s ease;font-weight:500;
  }
  .btn:hover{background:rgba(212,165,116,0.2);border-color:var(--gold);transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:linear-gradient(135deg,#d4a574,#e8b4a8);border:none;color:#0f1419}
  .btn.primary:hover{opacity:0.9}
  .btn.favorite{color:var(--accent)}
  .btn.favorite.on{background:rgba(232,180,168,0.2);border-color:var(--accent)}
  .btn[disabled]{opacity:0.4;cursor:not-allowed}

  .soundbar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
  .chip{
    appearance:none;cursor:pointer;padding:9px 16px;border-radius:20px;
    border:1px solid rgba(212,165,116,0.3);background:rgba(212,165,116,0.05);
    color:var(--light-text);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-weight:500;
  }
  .chip:hover{background:rgba(212,165,116,0.15);border-color:var(--gold)}
  .chip.on{background:rgba(212,165,116,0.25);border-color:var(--gold);color:var(--gold)}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:rgba(212,165,116,0.5);
    transition:all 0.3s ease}
  .chip.on .dot{background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .chip[disabled]{opacity:0.35;cursor:not-allowed}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;
    align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
  .modal.show{display:flex}
  .modal-content{
    background:linear-gradient(135deg,#1a1f2e 0%,#242a38 100%);border:1px solid rgba(212,165,116,0.2);

  .modal-close{

  .modal .lead{font-size:12px;color:var(--text-muted);letter-spacing:1.5px;
    text-transform:uppercase;margin-bottom:20px}

  .fav-list{display:flex;flex-direction:column;gap:0}
  .fav-item{

  .form-group input:focus,.form-group textarea:focus,.form-group select:focus{

  .cat-btn{

    background:rgba(212,165,116,0.05);color:var(--light-text);border-radius:6px;cursor:pointer;

    .quote-text{font-size:18px;line-height:1.5}

<div class="container">
  <div class="header">
    <h1>Daily Motivation</h1>
    <p>Find your spark · Every quote is a seed</p>
  </div>

  <div class="soundbar">
    <button class="chip" id="chip-voice"><span class="dot"></span>Read aloud</button>
    <button class="chip" id="chip-music"><span class="dot"></span>Ambient music</button>
  </div>

  <div class="controls">
    <button class="btn primary" id="btn-next">✦ Next quote</button>
    <button class="btn favorite" id="btn-favorite">★ Favorite</button>
    <button class="btn" id="btn-saved">❤ Saved</button>
    <button class="btn" id="btn-add">+ Add</button>
  </div>

  <div class="card" id="card">
    <div class="quote-text" id="quote-text"></div>
    <div class="quote-author" id="quote-author"></div>
    <div class="meta">
      <span id="quote-date"></span>
      <span id="quote-source"></span>
    </div>
  </div>
</div>

<div class="modal" id="fav-modal">
  <div class="modal-content" style="position:relative">
    <button class="modal-close" onclick="closeModal('fav-modal')">✕</button>
    <h2>Saved quotes</h2>
    <div class="lead">Your collection</div>
    <div class="fav-list" id="fav-list"></div>
  </div>
</div>

<div class="modal" id="add-modal">
  <div class="modal-content" style="position:relative">
    <button class="modal-close" onclick="closeModal('add-modal')">✕</button>
    <h2>Add your quote</h2>
    <div class="lead">Share your inspiration</div>
    <div class="form-group">
      <label>Category</label>
      <div class="category-select">
        <button class="cat-btn active" data-cat="motivation">Motivation</button>
        <button class="cat-btn" data-cat="wisdom">Wisdom</button>
        <button class="cat-btn" data-cat="success">Success</button>
        <button class="cat-btn" data-cat="life">Life</button>
      </div>
    </div>
    <div class="form-group">
      <label>Quote</label>
      <textarea id="new-quote" placeholder="Write something meaningful…"></textarea>
    </div>
    <div class="form-group">
      <label>Author (optional)</label>
      <input type="text" id="new-author" placeholder="Your name or source">
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn primary" id="btn-save">Save</button>
    </div>
  </div>
</div>

let state={
  voiceOn:false,musicOn:false,current:null,lastIdx:-1,
  favs:new Set(),custom:[],ctx:null,droneOsc:[],timer:null,
  scale:[220,261.63,293.66,329.63,392,440,523.25]
};

async function init(){
  loadState();
  drawCard();
  setupAudio();
  bindUI();
  updateFavButton();
}

function loadState(){
  try{const f=localStorage.getItem("fav");if(f)state.favs=new Set(JSON.parse(f))}catch(e){}
  try{const c=localStorage.getItem("custom");if(c)state.custom=JSON.parse(c)}catch(e){state.custom=[]}
}

function saveState(){
  try{localStorage.setItem("fav",JSON.stringify([...state.favs]))}catch(e){}
  try{localStorage.setItem("custom",JSON.stringify(state.custom))}catch(e){}
}

function getPool(){
  const pool=[...QUOTES.map((q,i)=>({id:"q"+i,text:q[0],author:q[1],cat:q[2]}))];
  pool.push(...state.custom.map((q,i)=>({id:"c"+i,text:q.text,author:q.author,cat:q.cat})));
  return pool;
}

function drawCard(){
  const pool=getPool();
  if(!pool.length)return;
  let idx;
  do{idx=Math.floor(Math.random()*pool.length)}while(idx===state.lastIdx);
  state.lastIdx=idx;
  state.current=pool[idx];
  
  document.getElementById("quote-text").textContent=state.current.text;
  document.getElementById("quote-author").textContent="— "+state.current.author;
  document.getElementById("quote-date").textContent="Today";
  document.getElementById("quote-source").textContent=state.current.cat.charAt(0).toUpperCase()+state.current.cat.slice(1);
  updateFavButton();
  if(state.voiceOn)setTimeout(()=>speak(),150);
}

function setupAudio(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC){
    document.getElementById("chip-voice").disabled=true;
    document.getElementById("chip-music").disabled=true;
  }
}

function speak(){
  if(!("speechSynthesis"in window)||!state.current)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(state.current.text+" by "+state.current.author);
  u.rate=0.9;u.pitch=1;
  speechSynthesis.speak(u);
}

function startMusic(){
  if(!state.ctx){
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    state.ctx=new AC();
  }
  if(state.ctx.state==="suspended")state.ctx.resume();
  
  const master=state.ctx.createGain();
  master.gain.value=0.15;
  master.connect(state.ctx.destination);
  
  const filt=state.ctx.createBiquadFilter();
  filt.type="lowpass";filt.frequency.value=800;filt.Q.value=0.7;
  filt.connect(master);
  
  [110,165].forEach(f=>{
    const o=state.ctx.createOscillator();
    const g=state.ctx.createGain();
    o.type="sine";o.frequency.value=f;
    o.detune.value=Math.random()*3;
    g.gain.value=0.12;
    o.connect(g);g.connect(filt);o.start();
    state.droneOsc.push(o);
  });
  
  const lfo=state.ctx.createOscillator();
  const lfoG=state.ctx.createGain();
  lfo.frequency.value=0.04;lfoG.gain.value=400;
  lfo.connect(lfoG);lfoG.connect(filt.frequency);lfo.start();
  state.droneOsc.push(lfo);
  
  const playBell=()=>{
    if(!state.musicOn)return;
    const f=state.scale[Math.floor(Math.random()*state.scale.length)];
    const o=state.ctx.createOscillator();
    const g=state.ctx.createGain();
    o.type="triangle";o.frequency.value=f;
    const now=state.ctx.currentTime;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.08,now+0.7);
    g.gain.exponentialRampToValueAtTime(0.0001,now+4);
    o.connect(g);g.connect(filt);
    o.start(now);o.stop(now+4.2);
    state.timer=setTimeout(playBell,2800+Math.random()*3000);
  };
  state.timer=setTimeout(playBell,1200);
}

function stopMusic(){
  state.musicOn=false;
  if(state.timer)clearTimeout(state.timer);
  state.droneOsc.forEach(o=>{try{o.stop()}catch(e){}});
  state.droneOsc=[];
}

function bindUI(){
  document.getElementById("btn-next").onclick=drawCard;
  document.getElementById("btn-favorite").onclick=()=>{
    if(!state.current)return;
    if(state.favs.has(state.current.id))state.favs.delete(state.current.id);
    else state.favs.add(state.current.id);
    saveState();updateFavButton();
  };
  document.getElementById("btn-saved").onclick=()=>openFav();
  document.getElementById("btn-add").onclick=()=>openModal("add-modal");
  
  document.getElementById("chip-voice").onclick=()=>{
    state.voiceOn=!state.voiceOn;
    document.getElementById("chip-voice").classList.toggle("on",state.voiceOn);
    if(state.voiceOn)speak();else speechSynthesis.cancel();
  };
  
  document.getElementById("chip-music").onclick=()=>{
    if(state.musicOn){stopMusic();document.getElementById("chip-music").classList.remove("on")}
    else{state.musicOn=true;document.getElementById("chip-music").classList.add("on");startMusic()}
  };
  
  document.querySelectorAll(".cat-btn").forEach(b=>b.onclick=function(){
    document.querySelectorAll(".cat-btn").forEach(x=>x.classList.remove("active"));
    this.classList.add("active");
    document.querySelector("#add-modal").dataset.cat=this.dataset.cat;
  });
  
  document.getElementById("btn-save").onclick=()=>{
    const text=document.getElementById("new-quote").value.trim();
    const author=document.getElementById("new-author").value.trim()||"You";
    if(!text)return;
    const cat=document.querySelector("#add-modal .cat-btn.active").dataset.cat;
    state.custom.push({text,author,cat});
    saveState();
    document.getElementById("new-quote").value="";
    document.getElementById("new-author").value="";
    closeModal("add-modal");
    drawCard();
  };
  
  document.querySelectorAll(".modal-close").forEach(b=>b.onclick=e=>{
    closeModal(e.target.closest(".modal").id);
  });
  
  document.querySelectorAll(".modal").forEach(m=>{
    m.addEventListener("click",e=>{if(e.target===m)closeModal(m.id)});
  });
}

function updateFavButton(){
  const b=document.getElementById("btn-favorite");
  if(state.current&&state.favs.has(state.current.id))b.classList.add("on");
  else b.classList.remove("on");
}

function openFav(){
  const pool=getPool();
  const kept=pool.filter(q=>state.favs.has(q.id));
  const list=document.getElementById("fav-list");
  if(!kept.length){
    list.innerHTML='<div class="empty">No saved quotes yet. Tap ★ to save.</div>';
  }else{
    list.innerHTML=kept.map(q=>`
      <div class="fav-item">
        <div style="flex:1;cursor:pointer" onclick="selectQuote('${q.id}')">
          <div class="text">"${q.text}"</div>
          <div class="author">— ${q.author}</div>
        </div>
        <button class="remove" onclick="removeFav('${q.id}')">Remove</button>
      </div>`).join("");
  }
  openModal("fav-modal");
}

function selectQuote(id){
  const pool=getPool();
  const q=pool.find(x=>x.id===id);
  if(q){state.current=q;state.lastIdx=-1;
    document.getElementById("quote-text").textContent=q.text;
    document.getElementById("quote-author").textContent="— "+q.author;
    document.getElementById("quote-source").textContent=q.cat.charAt(0).toUpperCase()+q.cat.slice(1);
    updateFavButton();
    closeModal("fav-modal");
    if(state.voiceOn)speak();
  }
}

function removeFav(id){
  state.favs.delete(id);
  saveState();
  openFav();
}

function openModal(id){document.getElementById(id).classList.add("show")}
function closeModal(id){document.getElementById(id).classList.remove("show")}

init();
</script>
</body>
</html>
